syntax = "proto3";

option java_package = "com.hyperosunfcker.data.proto";
option java_multiple_files = true;

message DebloatPreset {
  string name = 1;
  string description = 2;
  int64 created_date = 3;
  repeated string apps = 4;
  string version = 5;
}

message PresetsList {
  repeated DebloatPreset presets = 1;
}
